# Spring Boot 应用配置
spring:
  # 应用基本信息配置
  application:
    name: gateway-service # 服务名称，用于服务注册和发现
  # 云服务配置
  cloud:
    # Nacos 配置
    nacos:
      server-addr: localhost:8848 # Nacos 服务器地址，格式：ip:port
      # Nacos 服务发现配置
      discovery:
        namespace: public # 服务发现命名空间，用于环境隔离
      # Nacos 配置中心配置
      config:
        namespace: public # 配置中心命名空间，用于环境隔离
        file-extension: yaml # 配置文件扩展名，支持 yaml、properties
        import-check:
          enabled: false # 是否启用配置导入检查，关闭后不会因配置导入失败而启动失败
        timeout: 3000 # Nacos 连接超时时间，单位：毫秒
  # 配置导入配置
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml # 从 Nacos 导入配置，optional 表示可选
      - optional:classpath:application.yaml # 本地配置文件位置，设置为主要配置源
#    import: optional:nacos:${spring.application.name}.yaml # 从 Nacos 导入配置，optional 表示可选
#    add-location: classpath:application.yaml # 本地配置文件位置，设置为主要配置源
